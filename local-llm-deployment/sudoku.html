<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 1px;
            background: #333;
            border: 2px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: none;
            background: white;
            color: #333;
            padding: 0;
        }
        input:focus {
            outline: none;
            background: #e3f2fd;
        }
        input.fixed {
            background: #f5f5f5;
            font-weight: bold;
            color: #000;
        }
        .border-right {
            border-right: 2px solid #333;
        }
        .border-bottom {
            border-bottom: 2px solid #333;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #2196F3;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background: #1976D2;
        }
        button.secondary {
            background: #607D8B;
        }
        button.secondary:hover {
            background: #455A64;
        }
        #message {
            margin-top: 15px;
            height: 24px;
            font-weight: bold;
        }
        .success {
            color: #4CAF50;
        }
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <h1>Sudoku Solver</h1>
    <div class="grid-container" id="grid"></div>
    <div class="controls">
        <button onclick="solveSudoku()">Solve</button>
        <button class="secondary" onclick="clearGrid()">Clear</button>
        <button class="secondary" onclick="loadExample()">Load Example</button>
    </div>
    <div id="message"></div>

    <script>
        const gridElement = document.getElementById('grid');
        const messageElement = document.getElementById('message');
        let cells = [];

        function createGrid() {
            gridElement.innerHTML = '';
            cells = [];

            for (let i = 0; i < 81; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.dataset.index = i;

                const row = Math.floor(i / 9);
                const col = i % 9;

                // Add borders for 3x3 subgrids
                if ((col + 1) % 3 === 0 && col < 8) input.classList.add('border-right');
                if ((row + 1) % 3 === 0 && row < 8) input.classList.add('border-bottom');

                input.addEventListener('input', (e) => {
                    const value = e.target.value.replace(/[^1-9]/g, '');
                    e.target.value = value;
                });

                input.addEventListener('keydown', (e) => handleKeydown(e, i));

                gridElement.appendChild(input);
                cells.push(input);
            }
        }

        function handleKeydown(e, index) {
            const row = Math.floor(index / 9);
            const col = index % 9;

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                let newIndex = index;

                if (e.key === 'ArrowUp') newIndex = index - 9;
                if (e.key === 'ArrowDown') newIndex = index + 9;
                if (e.key === 'ArrowLeft') newIndex = index - 1;
                if (e.key === 'ArrowRight') newIndex = index + 1;

                if (newIndex >= 0 && newIndex < 81) {
                    cells[newIndex].focus();
                }
            }
        }

        function getBoard() {
            const board = [];
            for (let i = 0; i < 81; i++) {
                const value = cells[i].value;
                board.push(value === '' ? 0 : parseInt(value));
            }
            return board;
        }

        function setBoard(board, fixed = []) {
            for (let i = 0; i < 81; i++) {
                cells[i].value = board[i] === 0 ? '' : board[i];
                cells[i].classList.remove('fixed');
                if (fixed.includes(i)) {
                    cells[i].classList.add('fixed');
                }
            }
        }

        function isValid(board, row, col, num) {
            // Check row
            for (let x = 0; x < 9; x++) {
                if (board[row * 9 + x] === num) return false;
            }

            // Check column
            for (let x = 0; x < 9; x++) {
                if (board[x * 9 + col] === num) return false;
            }

            // Check 3x3 subgrid
            const startRow = Math.floor(row / 3) * 3;
            const startCol = Math.floor(col / 3) * 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[(startRow + i) * 9 + (startCol + j)] === num) return false;
                }
            }

            return true;
        }

        function solve(board) {
            for (let i = 0; i < 81; i++) {
                if (board[i] === 0) {
                    const row = Math.floor(i / 9);
                    const col = i % 9;

                    for (let num = 1; num <= 9; num++) {
                        if (isValid(board, row, col, num)) {
                            board[i] = num;

                            if (solve(board)) return true;

                            board[i] = 0;
                        }
                    }
                    return false;
                }
            }
            return true;
        }

        function solveSudoku() {
            const board = getBoard();
            messageElement.textContent = '';

            // Check for duplicates in initial state
            for (let i = 0; i < 81; i++) {
                if (board[i] === 0) continue;
                const row = Math.floor(i / 9);
                const col = i % 9;
                board[i] = 0; // Temporarily remove to check
                if (!isValid(board, row, col, getBoard()[i])) {
                    messageElement.textContent = 'Invalid Sudoku: Conflicting numbers';
                    messageElement.className = 'error';
                    return;
                }
                board[i] = getBoard()[i]; // Put it back
            }

            if (solve(board)) {
                setBoard(board);
                messageElement.textContent = 'Solved!';
                messageElement.className = 'success';
            } else {
                messageElement.textContent = 'No solution exists';
                messageElement.className = 'error';
            }
        }

        function clearGrid() {
            for (let i = 0; i < 81; i++) {
                cells[i].value = '';
                cells[i].classList.remove('fixed');
            }
            messageElement.textContent = '';
        }

        function loadExample() {
            clearGrid();
            const example = [
                5, 3, 0, 0, 7, 0, 0, 0, 0,
                6, 0, 0, 1, 9, 5, 0, 0, 0,
                0, 9, 8, 0, 0, 0, 0, 6, 0,
                8, 0, 0, 0, 6, 0, 0, 0, 3,
                4, 0, 0, 8, 0, 3, 0, 0, 1,
                7, 0, 0, 0, 2, 0, 0, 0, 6,
                0, 6, 0, 0, 0, 0, 2, 8, 0,
                0, 0, 0, 4, 1, 9, 0, 0, 5,
                0, 0, 0, 0, 8, 0, 0, 7, 9
            ];
            setBoard(example, Array.from({length: 81}, (_, i) => i).filter(i => example[i] !== 0));
        }

        // Initialize
        createGrid();
        loadExample();
    </script>
</body>
</html>
